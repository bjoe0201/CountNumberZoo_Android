<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 108 108">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </radialGradient>
    <clipPath id="round">
      <rect width="108" height="108" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="108" height="108" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Left ear outer -->
  <circle cx="33" cy="36" r="13" fill="#8D6E63" clip-path="url(#round)"/>
  <!-- Right ear outer -->
  <circle cx="75" cy="36" r="13" fill="#8D6E63" clip-path="url(#round)"/>
  <!-- Left ear inner -->
  <circle cx="33" cy="36" r="7" fill="#FFCCBC"/>
  <!-- Right ear inner -->
  <circle cx="75" cy="36" r="7" fill="#FFCCBC"/>

  <!-- Face -->
  <circle cx="54" cy="58" r="28" fill="#FFF8E1"/>

  <!-- Muzzle -->
  <ellipse cx="54" cy="66" rx="14" ry="10" fill="#FFE0B2"/>

  <!-- Left eye -->
  <circle cx="44" cy="52" r="5" fill="#3E2723"/>
  <!-- Right eye -->
  <circle cx="64" cy="52" r="5" fill="#3E2723"/>
  <!-- Left eye shine -->
  <circle cx="42" cy="50" r="2" fill="#FFFFFF"/>
  <!-- Right eye shine -->
  <circle cx="62" cy="50" r="2" fill="#FFFFFF"/>

  <!-- Nose -->
  <ellipse cx="54" cy="63" rx="3.5" ry="2.5" fill="#AD1457"/>

  <!-- Smile -->
  <path d="M46,70 Q54,78 62,70" fill="none" stroke="#5D4037" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Left cheek blush -->
  <ellipse cx="37" cy="68" rx="7" ry="4" fill="#F48FB1" opacity="0.55"/>
  <!-- Right cheek blush -->
  <ellipse cx="71" cy="68" rx="7" ry="4" fill="#F48FB1" opacity="0.55"/>

  <!-- Counting dots: orange, green, blue -->
  <circle cx="46" cy="89" r="4" fill="#FF7043"/>
  <circle cx="54" cy="89" r="4" fill="#43A047"/>
  <circle cx="62" cy="89" r="4" fill="#1E88E5"/>
</svg>
